name: build-and-deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repo path
        id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/hello-manara" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.image }}:latest

      - name: Pin image tag in k8s/service.yaml
        run: |
          set -e
          new_image="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_short }}"
          sed -i "s|image: ghcr.io/.*/hello-manara:.*|image: ${new_image}|" k8s/service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- k8s/service.yaml; then
            echo "no manifest change to commit"
          else
            git add k8s/service.yaml
            git commit -m "deploy: pin image to ${{ steps.vars.outputs.sha_short }} [skip ci]"
            git push
          fi
